info:
  name: login-user
  type: http
  seq: 1

http:
  method: POST
  url: "{{base_url}}/login"
  body:
    type: json
    data: |-
      {
          "username": "Nope",
          "password": "password"
      }
  auth: inherit

runtime:
  variables:
    - name: base_url
      value: http://localhost:3000

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
